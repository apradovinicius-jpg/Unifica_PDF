<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PDF Master v3 | Obsidian Variant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#cc97ff",
              "primary-container": "#592788",
              "secondary": "#69f6b8",
              "background": "#0b1325",
              "surface": "#131b2e",
              "surface-variant": "#222a3d",
              "on-surface": "#dae2fc",
              "on-surface-variant": "#cec3d2"
            },
            fontFamily: { "headline": ["Lexend"], "body": ["Manrope"] }
          }
        }
      }
    </script>
<style type="text/tailwindcss">
      @layer utilities {
        .glass { @apply bg-surface/60 backdrop-blur-xl border border-white/10; }
        .glass-light { @apply bg-white/60 backdrop-blur-xl border border-black/10; }
      }
      .dark body { background-color: #0b1325; color: #dae2fc; background-image: radial-gradient(circle at top left, rgba(204, 151, 255, 0.08), transparent 40%); }
      html:not(.dark) body { background-color: #f8fafc; color: #0f172a; background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.08), transparent 40%); }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="font-body min-h-screen transition-colors duration-300">

<nav class="h-20 glass dark:glass sticky top-0 z-50 flex items-center justify-between px-10 border-b border-black/5 dark:border-white/5 transition-all">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center border border-primary/30">
            <span class="material-symbols-outlined text-primary">auto_awesome</span>
        </div>
        <span class="text-xl font-extrabold font-headline tracking-tight text-primary">PDF Master <span class="text-xs opacity-50 uppercase tracking-widest font-sans ml-1">Obsidian</span></span>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-colors text-on-surface-variant"><span class="material-symbols-outlined">contrast</span></button>
</nav>

<main class="max-w-6xl mx-auto py-12 px-8 grid grid-cols-12 gap-10">
    <div class="col-span-12 lg:col-span-7 space-y-8">
        <div id="drop-zone" class="glass dark:glass rounded-3xl p-16 text-center cursor-pointer border-dashed border-2 border-black/5 dark:border-white/5 hover:border-primary/50 hover:bg-black/5 dark:hover:bg-white/5 transition-all group">
            <input type="file" id="file-input" accept=".pdf" multiple class="hidden">
            <span class="material-symbols-outlined text-primary text-6xl mb-4 block group-hover:scale-110 transition-transform">cloud_upload</span>
            <h2 class="text-2xl font-headline font-bold mb-2">Processamento Seguro</h2>
            <p class="text-on-surface-variant text-sm">Seus arquivos permanecem protegidos localmente.</p>
        </div>
        <div id="file-list" class="space-y-4"></div>
    </div>

    <aside class="col-span-12 lg:col-span-5">
        <div class="glass dark:glass rounded-3xl p-8 space-y-8 border border-black/5 dark:border-white/5 sticky top-32">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant">Nome do Arquivo de Saída</label>
                    <input type="text" id="final-name" placeholder="(Opcional) Ex: meu-documento" class="w-full bg-white/50 dark:bg-background/50 border border-black/10 dark:border-white/5 rounded-2xl px-5 py-4 focus:border-primary outline-none transition-all text-sm font-bold text-current">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant">Modo de Saída</label>
                        <select id="out-mode" class="w-full bg-white/50 dark:bg-background/50 border border-black/10 dark:border-white/5 rounded-2xl px-5 py-4 focus:border-primary outline-none text-xs font-bold appearance-none cursor-pointer">
                            <option value="merge">UNIFICAR TUDO</option>
                            <option value="split">SEPARAR ARQUIVOS</option>
                        </select>
                    </div>
                    <div id="split-wrap" class="hidden space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant">Tipo de Separação</label>
                        <select id="split-type" class="w-full bg-white/50 dark:bg-background/50 border border-black/10 dark:border-white/5 rounded-2xl px-5 py-4 focus:border-primary outline-none text-xs font-bold appearance-none cursor-pointer">
                            <option value="range">POR INTERVALOS</option>
                            <option value="single">PÁGINAS SOLTAS</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-3 pt-4">
                    <label class="flex items-center justify-between p-4 bg-black/5 dark:bg-white/5 rounded-2xl border border-black/5 dark:border-white/5 cursor-pointer group">
                        <span class="text-xs font-black uppercase tracking-wider">Remover Metadados</span>
                        <input type="checkbox" id="meta-toggle" class="w-5 h-5 accent-primary">
                    </label>
                    <label class="flex items-center justify-between p-4 bg-black/5 dark:bg-white/5 rounded-2xl border border-black/5 dark:border-white/5 cursor-pointer group">
                        <span class="text-xs font-black uppercase tracking-wider">Ativar Compressão</span>
                        <input type="checkbox" id="comp-toggle" class="w-5 h-5 accent-primary">
                    </label>
                </div>

                <div id="comp-area" class="hidden space-y-6 p-6 bg-primary/10 rounded-2xl border border-primary/20">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest opacity-60">Modo de Compressão</label>
                        <select id="comp-mode" class="w-full bg-white/50 dark:bg-background/50 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold appearance-none cursor-pointer">
                            <option value="free">QUALIDADE LIVRE</option>
                            <option value="target">TAMANHO MÁXIMO (MB)</option>
                        </select>
                    </div>

                    <div id="comp-q-wrap" class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black uppercase">Qualidade</label>
                            <span id="val-q" class="text-xs font-bold text-primary">70%</span>
                        </div>
                        <input type="range" id="comp-q" min="10" max="100" value="70" class="w-full accent-primary h-1.5 bg-black/10 dark:bg-white/10 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div id="comp-target-wrap" class="hidden space-y-2">
                        <label class="text-[10px] font-black uppercase">Tamanho Alvo (MB)</label>
                        <input type="number" id="comp-size" min="0.1" step="0.1" value="2.0" class="w-full bg-white/50 dark:bg-background/50 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold outline-none">
                    </div>

                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="comp-gray" class="accent-primary">
                        <label class="text-[10px] font-black uppercase">Tons de Cinza (P&B)</label>
                    </div>
                </div>

                <button id="btn-main" class="w-full py-6 bg-primary text-white dark:text-background font-headline font-black uppercase tracking-[0.2em] rounded-2xl hover:brightness-110 active:scale-[0.98] transition-all shadow-2xl shadow-primary/20 disabled:opacity-20">
                    Processar Documentos
                </button>
            </div>
        </div>
    </aside>
</main>

<div id="toast" class="fixed bottom-12 right-12 glass dark:glass p-6 rounded-3xl z-[100] translate-x-[200%] transition-transform duration-500 min-w-[320px]">
    <div class="flex items-center gap-4">
        <div id="loader" class="w-6 h-6 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span id="t-msg" class="text-sm font-black uppercase tracking-widest text-primary"></span>
    </div>
</div>

<footer class="py-16 opacity-30 text-center text-[10px] uppercase font-headline tracking-[0.4em]">
    Desenvolvido por Vinicius Prado &bull; Local Processing
</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let files = [];
const $ = id => document.getElementById(id);

$('drop-zone').onclick = () => $('file-input').click();
$('file-input').onchange = (e) => { handleFiles([...e.target.files]); $('file-input').value = ''; };
$('drop-zone').ondragover = e => { e.preventDefault(); $('drop-zone').classList.add('border-primary'); };
$('drop-zone').ondragleave = () => $('drop-zone').classList.remove('border-primary');
$('drop-zone').ondrop = e => { e.preventDefault(); handleFiles([...e.dataTransfer.files]); };

async function handleFiles(inc) {
    const pdfs = inc.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (!pdfs.length) return;
    toast('loading', 'LENDO ARQUIVOS...');
    for (const f of pdfs) {
        try {
            const buf = await f.arrayBuffer();
            const doc = await PDFLib.PDFDocument.load(buf.slice(0), { ignoreEncryption: true });
            const pdfjs = await pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;
            const pg = await pdfjs.getPage(1);
            const vp = pg.getViewport({ scale: 0.2 });
            const cv = document.createElement('canvas');
            cv.width = vp.width; cv.height = vp.height;
            await pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
            const thumb = cv.toDataURL('image/jpeg', 0.8);
            pdfjs.destroy();
            files.push({ id: Math.random(), name: f.name, size: f.size, pages: doc.getPageCount(), buf, range: `1-${doc.getPageCount()}`, expanded: false, thumb });
        } catch (e) { toast('error', 'ERRO DE LEITURA'); }
    }
    render();
}

function render() {
    $('file-list').innerHTML = '';
    files.forEach((f, i) => {
        const d = document.createElement('div');
        d.className = 'glass dark:glass p-5 rounded-3xl flex flex-col gap-5 border border-black/5 dark:border-white/5';
        d.innerHTML = `
            <div class="flex items-center gap-5">
                <div class="w-12 h-16 bg-black/5 dark:bg-background rounded-xl overflow-hidden border border-black/5 dark:border-white/5">${f.thumb ? `<img src="${f.thumb}" class="w-full h-full object-cover">` : ''}</div>
                <div class="flex-1 min-w-0">
                    <p class="font-bold text-sm truncate uppercase tracking-tighter">${f.name}</p>
                    <p class="text-[10px] text-primary font-black tracking-widest opacity-60">${f.pages} PÁGINAS // ${fmtSize(f.size)}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="tgl(${i})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-black/5 dark:bg-white/5 hover:bg-primary/10 transition-colors"><span class="material-symbols-outlined text-sm">tune</span></button>
                    <button onclick="rem(${i})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-black/5 dark:bg-white/5 hover:bg-red-500/10 text-red-500 transition-colors"><span class="material-symbols-outlined text-sm">close</span></button>
                </div>
            </div>
            ${f.expanded ? `<div class="p-5 bg-black/5 dark:bg-background/40 rounded-2xl space-y-3 border border-black/5 dark:border-white/5"><label class="text-[9px] font-black uppercase tracking-[0.2em] opacity-40 text-current">Intervalos de Páginas</label><input type="text" onchange="updR(${i}, this.value)" value="${f.range}" class="w-full bg-white/50 dark:bg-background border border-black/5 dark:border-white/5 rounded-xl px-4 py-3 text-xs font-mono outline-none focus:border-primary text-current"></div>` : ''}
        `;
        $('file-list').appendChild(d);
    });
    updUI();
}

function updUI() {
    const has = files.length > 0;
    const isSplit = $('out-mode').value === 'split';
    const isComp = $('comp-toggle').checked;
    const isTarget = $('comp-mode').value === 'target';

    $('split-wrap').classList.toggle('hidden', !isSplit);
    $('comp-area').classList.toggle('hidden', !isComp);
    $('comp-q-wrap').classList.toggle('hidden', isTarget);
    $('comp-target-wrap').classList.toggle('hidden', !isTarget);

    if (isSplit) {
        $('btn-main').textContent = isComp ? 'COMPRIMIR E SEPARAR' : 'SEPARAR PDF';
    } else {
        $('btn-main').textContent = isComp ? (files.length > 1 ? 'UNIFICAR E COMPRIMIR' : 'COMPRIMIR PDF') : 'UNIFICAR PDFs';
    }

    $('btn-main').disabled = !has || ($('out-mode').value === 'merge' && files.length < 2 && !isComp);
}

function rem(i) { files.splice(i,1); render(); }
function tgl(i) { files[i].expanded = !files[i].expanded; render(); }
function updR(i, v) { files[i].range = v; }
$('out-mode').onchange = updUI;
$('comp-toggle').onchange = updUI;
$('comp-mode').onchange = updUI;
$('comp-q').oninput = e => $('val-q').innerText = e.target.value + '%';

function fmtSize(b) { return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }
function ts() { const d = new Date(), p = n => String(n).padStart(2, '0'); return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + '_' + p(d.getHours()) + p(d.getMinutes()); }

function parseR(s, m) {
    const r = [];
    s.split(',').forEach(p => {
        const set = new Set();
        const b = p.trim().split('-').map(Number);
        if (b.length === 2) for (let i = Math.max(1, b[0]); i <= Math.min(m, b[1]); i++) set.add(i);
        else if (b.length === 1 && !isNaN(b[0]) && b[0] > 0 && b[0] <= m) set.add(b[0]);
        if (set.size) r.push([...set].sort((a,b)=>a-b));
    });
    return r;
}

async function renderPg(pdf, n, s, q, g) {
    const p = await pdf.getPage(n);
    const v = p.getViewport({ scale: s });
    const c = document.createElement('canvas');
    c.width = v.width; c.height = v.height;
    const x = c.getContext('2d');
    if (g) x.filter = 'grayscale(100%) contrast(1.1)';
    await p.render({ canvasContext: x, viewport: v }).promise;
    return new Promise(r => c.toBlob(async b => r(await b.arrayBuffer()), 'image/jpeg', q));
}

$('btn-main').onclick = async () => {
    const out = $('out-mode').value, spt = $('split-type').value, cmp = $('comp-toggle').checked, gry = $('comp-gray').checked, metaOff = $('meta-toggle').checked;
    const userFileName = $('final-name').value.trim();
    const base = userFileName || (out === 'merge' ? 'unificado' : 'separado');

    $('btn-main').disabled = true; toast('loading', 'PROCESSANDO...');

    try {
        let params = { scale: 1.5, quality: parseInt($('comp-q').value)/100 };
        if (cmp && $('comp-mode').value === 'target') {
            const targetMB = parseFloat($('comp-size').value);
            let total = 0;
            files.forEach(f => parseR(f.range, f.pages).forEach(r => total += r.length));
            const kb = (targetMB * 1024) / (total || 1);
            if (kb < 40) params = { scale: 1.0, quality: 0.2 };
            else if (kb < 70) params = { scale: 1.2, quality: 0.4 };
            else if (kb < 150) params = { scale: 1.5, quality: 0.6 };
            else params = { scale: 2.0, quality: 0.7 };
        }

        const res = [];
        if (out === 'merge') {
            const m = await PDFLib.PDFDocument.create();
            for (const f of files) {
                const pgs = parseR(f.range, f.pages).flat();
                if (cmp) {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise;
                    for (const p of pgs) {
                        const img = await m.embedJpg(await renderPg(pdf, p, params.scale, params.quality, gry));
                        m.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                    }
                    await pdf.destroy();
                } else {
                    const src = await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true });
                    (await m.copyPages(src, pgs.map(i => i-1))).forEach(p => m.addPage(p));
                }
            }
            if (metaOff) { m.setTitle(''); m.setAuthor(''); }
            const name = userFileName ? `${userFileName}.pdf` : `unificado_${ts()}.pdf`;
            res.push({ name, bytes: await m.save() });
        } else {
            for (const f of files) {
                const ranges = parseR(f.range, f.pages);
                if (spt === 'single') {
                    const pdf = cmp ? await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise : null;
                    const src = !cmp ? await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true }) : null;
                    for (const p of ranges.flat()) {
                        const sd = await PDFLib.PDFDocument.create();
                        if (cmp) {
                            const img = await sd.embedJpg(await renderPg(pdf, p, params.scale, params.quality, gry));
                            sd.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                        } else {
                            const [cp] = await sd.copyPages(src, [p-1]); sd.addPage(cp);
                        }
                        if (metaOff) { sd.setTitle(''); sd.setAuthor(''); }
                        res.push({ name: `${f.name.replace('.pdf','')}_p${p}.pdf`, bytes: await sd.save() });
                    }
                    if (pdf) await pdf.destroy();
                } else {
                    for (let rIdx = 0; rIdx < ranges.length; rIdx++) {
                        const sd = await PDFLib.PDFDocument.create();
                        const r = ranges[rIdx];
                        if (cmp) {
                            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise;
                            for (const p of r) {
                                const img = await sd.embedJpg(await renderPg(pdf, p, params.scale, params.quality, gry));
                                sd.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                            }
                            await pdf.destroy();
                        } else {
                            const src = await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true });
                            (await sd.copyPages(src, r.map(i => i-1))).forEach(p => sd.addPage(p));
                        }
                        if (metaOff) { sd.setTitle(''); sd.setAuthor(''); }
                        const suffix = ranges.length > 1 ? `_parte${rIdx+1}` : '_edit';
                        res.push({ name: `${f.name.replace('.pdf','')}${suffix}.pdf`, bytes: await sd.save() });
                    }
                }
            }
        }
        if (res.length === 1) {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([res[0].bytes], {type:'application/pdf'})); a.download = res[0].name; a.click();
            toast('success', 'CONCLUÍDO');
        } else {
            const z = new JSZip(); res.forEach(r => z.file(r.name, r.bytes));
            const a = document.createElement('a'); a.href = URL.createObjectURL(await z.generateAsync({type:'blob'})); a.download = `${base}.zip`; a.click();
            toast('success', 'PACOTE ZIP PRONTO');
        }
    } catch (e) { toast('error', 'FALHA NO SISTEMA'); }
    finally { $('btn-main').disabled = false; setTimeout(() => $('toast').classList.remove('v'), 3000); }
};

function toast(t, m) {
    $('toast').className = `fixed bottom-12 right-12 glass dark:glass p-6 rounded-3xl z-[100] v ${t}`;
    $('t-msg').innerText = m;
    $('loader').style.display = t === 'loading' ? 'block' : 'none';
}
</script>
</body>
</html>
