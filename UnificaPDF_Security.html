<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PDF Master v3 | Security Variant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00E676",
              "secondary": "#42A5F5",
              "background": "#060e20",
              "surface": "#0b1325",
              "surface-light": "#131b2e",
              "on-surface": "#dae2fc",
              "on-surface-variant": "#cec3d2"
            },
            fontFamily: { "headline": ["Orbitron"], "body": ["Inter"] }
          }
        }
      }
    </script>
<style type="text/tailwindcss">
      @layer utilities {
        .neon-glow { text-shadow: 0 0 10px rgba(0,230,118,0.4); }
        .neon-border { @apply border border-primary/20 shadow-[0_0_15px_rgba(0,230,118,0.1)]; }
      }
      body { background-image: radial-gradient(circle at bottom right, rgba(0, 230, 118, 0.05), transparent 40%); }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">

<nav class="h-20 bg-surface/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/5 flex items-center justify-between px-10">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary/10 rounded border border-primary/30 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary neon-glow">security</span>
        </div>
        <span class="font-headline font-black text-xl tracking-tighter text-primary neon-glow uppercase">PDF Node <span class="text-secondary text-xs opacity-50 ml-1">v.3</span></span>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 text-on-surface-variant hover:text-primary transition-colors"><span class="material-symbols-outlined">settings_input_antenna</span></button>
</nav>

<main class="max-w-7xl mx-auto py-12 px-8 grid grid-cols-12 gap-12">
    <div class="col-span-12 lg:col-span-7 space-y-8">
        <div id="drop-zone" class="bg-surface/50 border-2 border-dashed border-white/10 rounded-3xl p-20 text-center cursor-pointer hover:border-primary/50 hover:bg-surface transition-all group">
            <input type="file" id="file-input" accept=".pdf" multiple class="hidden">
            <span class="material-symbols-outlined text-primary text-6xl mb-6 block group-hover:scale-110 transition-transform">terminal</span>
            <h2 class="text-2xl font-headline font-black uppercase tracking-widest">Execute Upload</h2>
            <p class="text-on-surface-variant text-sm font-mono opacity-60">Status: Waiting for input bitstream...</p>
        </div>
        <div id="file-list" class="space-y-4"></div>
    </div>

    <aside class="col-span-12 lg:col-span-5">
        <div class="bg-surface rounded-3xl p-10 neon-border space-y-10 sticky top-32">
            <div class="flex items-center gap-2 border-b border-white/5 pb-4">
                <span class="material-symbols-outlined text-secondary">analytics</span>
                <h3 class="font-headline font-bold uppercase text-xs tracking-[0.3em] text-secondary">Control Matrix</h3>
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] text-on-surface-variant">Output Identifier</label>
                    <input type="text" id="final-name" placeholder="SYS_REF_ALPHA" class="w-full bg-background border border-white/10 rounded px-5 py-4 font-mono text-sm focus:border-primary outline-none transition-all">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-[0.2em] text-on-surface-variant">Protocol</label>
                        <select id="out-mode" class="w-full bg-background border border-white/10 rounded px-4 py-4 text-[10px] font-bold focus:border-primary outline-none appearance-none cursor-pointer">
                            <option value="merge">CONSOLIDATE</option>
                            <option value="split">EXTRACT</option>
                        </select>
                    </div>
                    <div id="split-wrap" class="hidden space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-[0.2em] text-on-surface-variant">Granularity</label>
                        <select id="split-type" class="w-full bg-background border border-white/10 rounded px-4 py-4 text-[10px] font-bold focus:border-primary outline-none appearance-none cursor-pointer">
                            <option value="range">RANGES</option>
                            <option value="single">ATOMIC</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4 pt-4">
                    <label class="flex items-center justify-between p-5 bg-background border border-white/5 rounded-2xl cursor-pointer hover:bg-white/5 transition-colors">
                        <span class="text-[10px] font-black uppercase tracking-widest">Metadata Scrub</span>
                        <input type="checkbox" id="meta-toggle" class="w-5 h-5 accent-primary">
                    </label>
                    <label class="flex items-center justify-between p-5 bg-background border border-white/5 rounded-2xl cursor-pointer hover:bg-white/5 transition-colors">
                        <span class="text-[10px] font-black uppercase tracking-widest">Byte Stream Opt</span>
                        <input type="checkbox" id="comp-toggle" class="w-5 h-5 accent-primary">
                    </label>
                </div>

                <div id="comp-area" class="hidden space-y-5 p-8 bg-primary/5 rounded-3xl border border-primary/20">
                    <div class="flex justify-between items-center"><label class="text-[9px] font-black tracking-widest uppercase">Ratio</label><span id="val-q" class="font-mono text-primary text-xs">70%</span></div>
                    <input type="range" id="comp-q" min="10" max="100" value="70" class="w-full accent-primary">
                    <div class="flex items-center gap-3"><input type="checkbox" id="comp-gray" class="w-4 h-4 accent-primary"><label class="text-[9px] font-black tracking-widest uppercase">Grayscale Layer</label></div>
                </div>

                <button id="btn-main" class="w-full py-6 bg-primary text-background font-headline font-black uppercase tracking-[0.3em] rounded-xl hover:brightness-110 active:scale-95 transition-all shadow-[0_0_30px_rgba(0,230,118,0.2)] disabled:opacity-20">
                    Run Procedure
                </button>
            </div>
        </div>
    </aside>
</main>

<div id="toast" class="fixed bottom-12 right-12 bg-surface neon-border p-8 rounded-3xl z-[100] translate-x-[200%] transition-transform duration-500 min-w-[350px]">
    <div class="flex items-center gap-5">
        <div id="loader" class="w-6 h-6 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <span id="t-msg" class="text-[11px] font-headline font-black uppercase tracking-[0.2em] text-primary"></span>
    </div>
</div>

<footer class="py-20 border-t border-white/5 text-center opacity-40">
    <p class="text-[10px] font-headline tracking-[0.5em] uppercase">Operator: Vinicius Prado &bull; Security Level 3</p>
</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let files = [];
const $ = id => document.getElementById(id);

$('drop-zone').onclick = () => $('file-input').click();
$('file-input').onchange = (e) => { handleFiles([...e.target.files]); $('file-input').value = ''; };
$('drop-zone').ondragover = e => { e.preventDefault(); $('drop-zone').classList.add('border-primary'); };
$('drop-zone').ondragleave = () => $('drop-zone').classList.remove('border-primary');
$('drop-zone').ondrop = e => { e.preventDefault(); handleFiles([...e.dataTransfer.files]); };

async function handleFiles(inc) {
    const pdfs = inc.filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (!pdfs.length) return;
    toast('loading', 'BITSTREAM SCAN...');
    for (const f of pdfs) {
        try {
            const buf = await f.arrayBuffer();
            const doc = await PDFLib.PDFDocument.load(buf.slice(0), { ignoreEncryption: true });
            const pdfjs = await pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;
            const pg = await pdfjs.getPage(1);
            const vp = pg.getViewport({ scale: 0.2 });
            const cv = document.createElement('canvas');
            cv.width = vp.width; cv.height = vp.height;
            await pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
            const thumb = cv.toDataURL('image/jpeg', 0.8);
            pdfjs.destroy();
            files.push({ id: Math.random(), name: f.name, size: f.size, pages: doc.getPageCount(), buf, range: `1-${doc.getPageCount()}`, expanded: false, thumb });
        } catch (e) { toast('error', 'I/O ERROR'); }
    }
    render();
}

function render() {
    $('file-list').innerHTML = '';
    files.forEach((f, i) => {
        const d = document.createElement('div');
        d.className = 'bg-surface/80 p-6 rounded-3xl border border-white/5 flex flex-col gap-6';
        d.innerHTML = `
            <div class="flex items-center gap-6">
                <div class="w-12 h-16 bg-background rounded overflow-hidden border border-white/10">${f.thumb ? `<img src="${f.thumb}" class="w-full h-full object-cover">` : ''}</div>
                <div class="flex-1 min-w-0">
                    <p class="font-black text-xs truncate uppercase tracking-widest">${f.name}</p>
                    <p class="text-[9px] text-primary font-black tracking-[0.2em] opacity-80 mt-1">${f.pages} PGS // ${(f.size/1024/1024).toFixed(2)} MB</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="tgl(${i})" class="w-12 h-12 flex items-center justify-center rounded-xl bg-background border border-white/10 text-on-surface-variant hover:text-primary transition-all active:scale-90"><span class="material-symbols-outlined text-sm">settings_input_component</span></button>
                    <button onclick="rem(${i})" class="w-12 h-12 flex items-center justify-center rounded-xl bg-background border border-white/10 text-on-surface-variant hover:text-red-500 transition-all active:scale-90"><span class="material-symbols-outlined text-sm">delete</span></button>
                </div>
            </div>
            ${f.expanded ? `<div class="p-6 bg-background/50 rounded-2xl space-y-3 border border-white/5"><label class="text-[9px] font-black uppercase tracking-[0.3em] opacity-40">Matrix Range Selector</label><input type="text" onchange="updR(${i}, this.value)" value="${f.range}" class="w-full bg-background border border-white/10 rounded px-5 py-3 text-xs font-mono outline-none focus:border-primary"></div>` : ''}
        `;
        $('file-list').appendChild(d);
    });
    updUI();
}

function updUI() {
    const has = files.length > 0;
    $('split-wrap').classList.toggle('hidden', $('out-mode').value !== 'split');
    $('comp-area').classList.toggle('hidden', !$('comp-toggle').checked);
    $('btn-main').disabled = !has || ($('out-mode').value === 'merge' && files.length < 2 && !$('comp-toggle').checked);
}

function rem(i) { files.splice(i,1); render(); }
function tgl(i) { files[i].expanded = !files[i].expanded; render(); }
function updR(i, v) { files[i].range = v; }
$('out-mode').onchange = updUI;
$('comp-toggle').onchange = updUI;
$('comp-q').oninput = e => $('val-q').innerText = e.target.value + '%';

function parseR(s, m) {
    const r = [];
    s.split(',').forEach(p => {
        const set = new Set();
        const b = p.trim().split('-').map(Number);
        if (b.length === 2) for (let i = Math.max(1, b[0]); i <= Math.min(m, b[1]); i++) set.add(i);
        else if (b.length === 1 && !isNaN(b[0]) && b[0] > 0 && b[0] <= m) set.add(b[0]);
        if (set.size) r.push([...set].sort((a,b)=>a-b));
    });
    return r;
}

async function renderPg(pdf, n, s, q, g) {
    const p = await pdf.getPage(n);
    const v = p.getViewport({ scale: s });
    const c = document.createElement('canvas');
    c.width = v.width; c.height = v.height;
    const x = c.getContext('2d');
    if (g) x.filter = 'grayscale(100%) contrast(1.1)';
    await p.render({ canvasContext: x, viewport: v }).promise;
    return new Promise(r => c.toBlob(async b => r(await b.arrayBuffer()), 'image/jpeg', q));
}

$('btn-main').onclick = async () => {
    const out = $('out-mode').value, spt = $('split-type').value, cmp = $('comp-toggle').checked, gry = $('comp-gray').checked;
    const base = $('final-name').value.trim() || 'NODE_EXPORT';
    $('btn-main').disabled = true; toast('loading', 'EXECUTING PROCEDURE...');

    try {
        const res = [];
        const q = parseInt($('comp-q').value)/100;

        if (out === 'merge') {
            const m = await PDFLib.PDFDocument.create();
            for (const f of files) {
                const pgs = parseR(f.range, f.pages).flat();
                if (cmp) {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise;
                    for (const p of pgs) {
                        const img = await m.embedJpg(await renderPg(pdf, p, 1.5, q, gry));
                        m.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                    }
                    await pdf.destroy();
                } else {
                    const src = await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true });
                    (await m.copyPages(src, pgs.map(i => i-1))).forEach(p => m.addPage(p));
                }
            }
            res.push({ name: `${base}.pdf`, bytes: await m.save() });
        } else {
            for (const f of files) {
                const ranges = parseR(f.range, f.pages);
                if (spt === 'single') {
                    const pdf = cmp ? await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise : null;
                    const src = !cmp ? await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true }) : null;
                    for (const p of ranges.flat()) {
                        const sd = await PDFLib.PDFDocument.create();
                        if (cmp) {
                            const img = await sd.embedJpg(await renderPg(pdf, p, 1.5, q, gry));
                            sd.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                        } else {
                            const [cp] = await sd.copyPages(src, [p-1]); sd.addPage(cp);
                        }
                        res.push({ name: `${f.name.replace('.pdf','')}_p${p}.pdf`, bytes: await sd.save() });
                    }
                    if (pdf) await pdf.destroy();
                } else {
                    for (let rIdx = 0; rIdx < ranges.length; rIdx++) {
                        const sd = await PDFLib.PDFDocument.create();
                        const r = ranges[rIdx];
                        if (cmp) {
                            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(f.buf.slice(0)) }).promise;
                            for (const p of r) {
                                const img = await sd.embedJpg(await renderPg(pdf, p, 1.5, q, gry));
                                sd.addPage([img.width, img.height]).drawImage(img, { x:0, y:0, width: img.width, height: img.height });
                            }
                            await pdf.destroy();
                        } else {
                            const src = await PDFLib.PDFDocument.load(f.buf.slice(0), { ignoreEncryption: true });
                            (await sd.copyPages(src, r.map(i => i-1))).forEach(p => sd.addPage(p));
                        }
                        const suffix = ranges.length > 1 ? `_part${rIdx+1}` : '_edit';
                        res.push({ name: `${f.name.replace('.pdf','')}${suffix}.pdf`, bytes: await sd.save() });
                    }
                }
            }
        }
        if (res.length === 1) {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([res[0].bytes], {type:'application/pdf'})); a.download = res[0].name; a.click();
            toast('success', 'ACCESS GRANTED');
        } else {
            const z = new JSZip(); res.forEach(r => z.file(r.name, r.bytes));
            const a = document.createElement('a'); a.href = URL.createObjectURL(await z.generateAsync({type:'blob'})); a.download = `${base}.zip`; a.click();
            toast('success', 'ARCHIVE READY');
        }
    } catch (e) { toast('error', 'FAILURE'); }
    finally { $('btn-main').disabled = false; setTimeout(() => $('toast').classList.remove('v'), 3000); }
};

function toast(t, m) {
    $('toast').className = `fixed bottom-12 right-12 bg-surface neon-border p-8 rounded-3xl z-[100] v ${t}`;
    $('t-msg').innerText = m;
    $('loader').style.display = t === 'loading' ? 'block' : 'none';
}
</script>
</body>
</html>
